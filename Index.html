<!DOCTYPE html>
<html>
<head>
    <title>Drift Boss Clone</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        canvas { background: #34495e; border: 4px solid #ecf0f1; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; color: white; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreUI = document.getElementById('ui');

    let score = 0;
    let gameActive = true;
    let isDrifting = false;

    // Car properties
    const car = { x: 200, y: 400, size: 20, speed: 3 };

    // Track properties (Simplified as a list of segments)
    let path = [
        { x: 150, width: 100, length: 300 },
        { x: 150, width: 100, length: 1000 } // Long initial path
    ];

    function update() {
        if (!gameActive) return;

        // Move car based on input
        // Standard: Up-Left | Drift: Up-Right
        if (isDrifting) {
            car.x += car.speed;
        } else {
            car.x -= car.speed;
        }

        // Check if car is still on track (Basic collision)
        // In this simple version, we check if car.x is within 150 and 250
        if (car.x < 120 || car.x > 280) {
            gameActive = false;
            alert("Game Over! Score: " + Math.floor(score));
            location.reload();
        }

        score += 0.1;
        scoreUI.innerText = "Score: " + Math.floor(score);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Track (Static center for this simple demo)
        ctx.fillStyle = "#95a5a6";
        ctx.fillRect(120, 0, 160, canvas.height);

        // Draw Car
        ctx.fillStyle = "#e74c3c";
        ctx.save();
        ctx.translate(car.x, car.y);
        // Rotate car slightly based on direction
        ctx.rotate(isDrifting ? 0.3 : -0.3);
        ctx.fillRect(-car.size/2, -car.size/2, car.size, car.size);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    // Input Listeners
    window.addEventListener('mousedown', () => isDrifting = true);
    window.addEventListener('mouseup', () => isDrifting = false);
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') isDrifting = true; });
    window.addEventListener('keyup', (e) => { if(e.code === 'Space') isDrifting = false; });

    draw();
</script>
</body>
</html>
